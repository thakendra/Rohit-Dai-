<!-- ══ INTRO VIDEO SECTION ══ -->
<style>
.intro-video-section {
  position: relative;
  width: 100%;
  padding: clamp(60px,8vw,100px) clamp(24px,6vw,80px);
  background: #070d07;
  border-top: 1px solid rgba(74,140,63,0.15);
  overflow: hidden;
}
.intro-video-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 80%, rgba(74,140,63,0.07) 0%, transparent 65%);
  pointer-events: none;
}
.intro-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.8rem,4.5vw,3.2rem);
  font-weight: 400;
  letter-spacing: 0.12em;
  color: #4a8c3f;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  margin: 0 auto clamp(36px,5vw,56px);
}
.intro-title::before,
.intro-title::after {
  content: '';
  width: 60px;
  height: 2px;
  background: #4a8c3f;
  flex-shrink: 0;
}
.video-wrapper {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
}
.video-glow {
  position: absolute;
  inset: -30px;
  background: radial-gradient(ellipse at center, rgba(74,140,63,0.12) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}
.video-frame {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #0d150d;
  border: 1px solid rgba(74,140,63,0.25);
  overflow: hidden;
  z-index: 1;
}
.video-frame iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
.video-corner {
  position: absolute;
  width: 24px;
  height: 24px;
  border-color: #6dbf5e;
  border-style: solid;
  opacity: 0.7;
  z-index: 2;
  pointer-events: none;
}
.video-corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.video-corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.video-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
.video-corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
.video-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  padding: 0 4px;
}
.video-tag {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(109,191,94,0.45);
}
.video-live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #6dbf5e;
  opacity: 0.6;
  animation: vidpulse 2s ease-in-out infinite;
}
@keyframes vidpulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.3); }
}
</style>

<section class="intro-video-section reveal">
  <h2 class="intro-title">A Glimpse</h2>
  <div class="video-wrapper">
    <div class="video-glow"></div>
    <div class="video-frame">
      <div class="video-corner tl"></div>
      <div class="video-corner tr"></div>
      <div class="video-corner bl"></div>
      <div class="video-corner br"></div>
      <iframe
        src="https://www.youtube.com/embed/isrF-tyDEwI?autoplay=1&mute=1&loop=1&playlist=isrF-tyDEwI&controls=1&modestbranding=1&rel=0"
        title="Rohit Malla — Intro Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>
    <div class="video-meta">
      <span class="video-tag">Rohit Malla · Official</span>
      <div class="video-live-dot"></div>
      <span class="video-tag">YouTube</span>
    </div>
  </div>
</section>
