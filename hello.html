<!-- ══ REELS SECTION ══ -->
<style>
.reels-section{background:#070d07;padding:clamp(60px,8vw,100px) 0;overflow:hidden;}
.reels-header{padding:0 clamp(24px,6vw,80px);margin-bottom:clamp(32px,4vw,52px);display:flex;align-items:center;justify-content:center;}
.reels-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,4vw,3rem);font-weight:400;letter-spacing:0.05em;color:#6dbf5e;display:flex;align-items:center;gap:20px;}
.reels-title::before,.reels-title::after{content:'';flex:1;max-width:80px;height:1px;background:#6dbf5e;}

/* SLIDER */
.slider-wrap{position:relative;width:100%;overflow:hidden;cursor:grab;touch-action:pan-y;user-select:none;}
.slider-wrap:active{cursor:grabbing;}
.slider-wrap::before,.slider-wrap::after{content:'';position:absolute;top:0;bottom:0;width:clamp(30px,6vw,80px);z-index:2;pointer-events:none;}
.slider-wrap::before{left:0;background:linear-gradient(to right,#070d07,transparent);}
.slider-wrap::after{right:0;background:linear-gradient(to left,#070d07,transparent);}
.slider-track{display:flex;gap:14px;padding:0 clamp(24px,6vw,80px);width:max-content;}
.reel-card{position:relative;flex-shrink:0;width:clamp(140px,18vw,200px);aspect-ratio:9/16;overflow:hidden;border:1px solid rgba(74,140,63,0.2);border-radius:10px;cursor:pointer;background:#0d150d;transition:border-color 0.35s,transform 0.35s;}
.reel-card:hover{border-color:#6dbf5e;transform:scale(1.04);}
.reel-card img{width:100%;height:100%;object-fit:cover;filter:brightness(0.6) saturate(0.75);transition:filter 0.45s,transform 0.45s;display:block;-webkit-user-drag:none;pointer-events:none;}
.reel-card:hover img{filter:brightness(0.8) saturate(1);transform:scale(1.06);}
.reel-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,13,7,0.92)0%,transparent 55%);border-radius:10px;pointer-events:none;}
.reel-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;background:rgba(0,0,0,0.6);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(109,191,94,0.8);transition:background 0.3s,border-color 0.3s,transform 0.3s;pointer-events:none;}
.reel-card:hover .reel-play{background:rgba(109,191,94,0.25);border-color:#6dbf5e;transform:translate(-50%,-50%) scale(1.1);}
.reel-play svg{width:18px;height:18px;fill:#6dbf5e;margin-left:3px;}
.reel-meta{position:absolute;bottom:0;left:0;right:0;padding:12px 10px;pointer-events:none;}
.reel-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#6dbf5e;line-height:1;}
.reel-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(109,191,94,0.6);margin-top:2px;}

/* MODAL */
.rm-modal{display:none;position:fixed;inset:0;z-index:99999;background:rgba(5,10,5,0.97);align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.rm-modal.open{display:flex;}
.rm-modal-inner{position:relative;width:min(340px,88vw);aspect-ratio:9/16;background:#000;border-radius:12px;overflow:hidden;border:1.5px solid rgba(109,191,94,0.3);}
.rm-modal-inner .fb-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;}
.rm-modal-inner .fb-wrap iframe{width:100%;height:100%;border:none;display:block;}
.rm-modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;background:rgba(7,13,7,0.85);border:1px solid rgba(109,191,94,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;transition:background 0.2s;}
.rm-modal-close:hover{background:rgba(74,140,63,0.3);}
.rm-modal-close svg{width:13px;height:13px;stroke:#6dbf5e;stroke-width:2.5;fill:none;}
.rm-modal-nav{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;background:rgba(7,13,7,0.75);border:1px solid rgba(109,191,94,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;transition:background 0.2s;}
.rm-modal-nav:hover{background:rgba(74,140,63,0.25);}
.rm-modal-nav svg{width:13px;height:13px;stroke:#6dbf5e;stroke-width:2.5;fill:none;}
.rm-modal-prev{left:-44px;}
.rm-modal-next{right:-44px;}
.rm-modal-dots{display:flex;gap:7px;justify-content:center;}
.rm-modal-dot{width:7px;height:7px;border-radius:50%;background:rgba(109,191,94,0.25);cursor:pointer;transition:background 0.3s;}
.rm-modal-dot.active{background:#6dbf5e;}
.rm-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:3;}
.rm-loading svg{animation:rmspin 1s linear infinite;}
@keyframes rmspin{to{transform:rotate(360deg);}}

@media(max-width:600px){
  .reel-card{width:clamp(110px,38vw,150px);}
  .rm-modal-prev{left:4px;}
  .rm-modal-next{right:4px;}
  .rm-modal-inner{width:92vw;}
}
</style>

<!-- Facebook SDK - REQUIRED for embed -->
<div id="fb-root"></div>
<script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v19.0"></script>

<!-- SECTION -->
<section class="reels-section">
  <div class="reels-header">
    <div class="reels-title">Some Popular Videos</div>
  </div>
  <div class="slider-wrap" id="reelSlider">
    <div class="slider-track" id="reelTrack"></div>
  </div>
</section>

<!-- MODAL -->
<div class="rm-modal" id="rmModal">
  <div class="rm-modal-inner" id="rmModalInner">
    <div class="rm-loading" id="rmLoading">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="14" stroke="rgba(109,191,94,0.2)" stroke-width="3"/>
        <path d="M18 4 A14 14 0 0 1 32 18" stroke="#6dbf5e" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="fb-wrap" id="rmFbWrap"></div>
    <button class="rm-modal-close" id="rmClose">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="rm-modal-nav rm-modal-prev" id="rmPrev">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="rm-modal-nav rm-modal-next" id="rmNext">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
  <div class="rm-modal-dots" id="rmDots"></div>
</div>

<script>
const reels = [
  {thumb:'thumnails/video 1.jpeg', title:'Reel 1', link:'https://www.facebook.com/reel/1914496289253254'},
  {thumb:'thumnails/video 2.jpeg', title:'Reel 2', link:'https://www.facebook.com/reel/1900021663966811'},
  {thumb:'thumnails/video 3.jpeg', title:'Reel 3', link:'https://www.facebook.com/reel/755865803990188'},
  {thumb:'thumnails/video 4.jpeg', title:'Reel 4', link:'https://www.facebook.com/reel/2040787803514777'},
  {thumb:'thumnails/video 5.jpeg', title:'Reel 5', link:'https://www.facebook.com/reel/880781708056190'},
  {thumb:'thumnails/video 6.jpeg', title:'Reel 6', link:'https://www.facebook.com/reel/1366845861826079'},
  {thumb:'thumnails/video 7.jpeg', title:'Reel 7', link:'https://www.facebook.com/reel/2951702688357510'},
  {thumb:'thumnails/video 8.jpeg', title:'Reel 8', link:'https://www.facebook.com/reel/1202204618534485'},
];

const track   = document.getElementById('reelTrack');
const modal   = document.getElementById('rmModal');
const fbWrap  = document.getElementById('rmFbWrap');
const loading = document.getElementById('rmLoading');
const dots    = document.getElementById('rmDots');
let current   = 0;

/* Build thumbnail cards */
reels.forEach((r, i) => {
  const card = document.createElement('div');
  card.className = 'reel-card';
  card.innerHTML = `
    <img src="${r.thumb}" alt="${r.title}" draggable="false">
    <div class="reel-overlay"></div>
    <div class="reel-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
    <div class="reel-meta">
      <div class="reel-num">${String(i+1).padStart(2,'0')}</div>
      <div class="reel-label">Facebook Reel</div>
    </div>`;
  card.addEventListener('click', () => openModal(i));
  track.appendChild(card);
});

/* Build dots */
function buildDots() {
  dots.innerHTML = '';
  reels.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'rm-modal-dot' + (i === current ? ' active' : '');
    d.addEventListener('click', () => openModal(i));
    dots.appendChild(d);
  });
}

/* Open modal with Facebook embed */
function openModal(i) {
  current = i;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  loading.style.display = 'flex';
  fbWrap.innerHTML = '';
  buildDots();

  /* Facebook Video embed via iframe */
  const encodedUrl = encodeURIComponent(reels[i].link);
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.facebook.com/plugins/video.php?href=${encodedUrl}&show_text=false&autoplay=1&mute=0`;
  iframe.width = '100%';
  iframe.height = '100%';
  iframe.style.border = 'none';
  iframe.style.display = 'block';
  iframe.allowFullscreen = true;
  iframe.allow = 'autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share';
  iframe.onload = () => { loading.style.display = 'none'; };
  fbWrap.appendChild(iframe);
}

/* Close */
function closeModal() {
  modal.classList.remove('open');
  document.body.style.overflow = '';
  fbWrap.innerHTML = '';
}

document.getElementById('rmClose').addEventListener('click', closeModal);
modal.addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('rmPrev').addEventListener('click', () => openModal((current - 1 + reels.length) % reels.length));
document.getElementById('rmNext').addEventListener('click', () => openModal((current + 1) % reels.length));
document.addEventListener('keydown', function(e) {
  if (!modal.classList.contains('open')) return;
  if (e.key === 'Escape')     closeModal();
  if (e.key === 'ArrowLeft')  openModal((current - 1 + reels.length) % reels.length);
  if (e.key === 'ArrowRight') openModal((current + 1) % reels.length);
});

/* Drag slider — mouse */
const slider = document.getElementById('reelSlider');
let isDrag = false, startX = 0, trackML = 0;
slider.addEventListener('mousedown', e => {
  isDrag = true; startX = e.clientX;
  trackML = parseFloat(track.style.marginLeft) || 0;
});
document.addEventListener('mousemove', e => {
  if (!isDrag) return;
  const min = -(track.scrollWidth - slider.offsetWidth);
  track.style.marginLeft = Math.min(0, Math.max(min, trackML + (e.clientX - startX))) + 'px';
});
document.addEventListener('mouseup', () => isDrag = false);

/* Drag slider — touch */
let touchStartX = 0, touchML = 0;
slider.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchML = parseFloat(track.style.marginLeft) || 0;
}, {passive: true});
slider.addEventListener('touchmove', e => {
  const min = -(track.scrollWidth - slider.offsetWidth);
  track.style.marginLeft = Math.min(0, Math.max(min, touchML + (e.touches[0].clientX - touchStartX))) + 'px';
}, {passive: true});
</script>
