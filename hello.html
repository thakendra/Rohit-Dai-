<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohit Malla — Breakthrough Leader</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green-900: #0a1f0e;
    --green-accent: #4ade80;
    --gold-light: #e8c87c;
    --white: #ffffff;
    --white-85: rgba(255,255,255,0.85);
    --white-60: rgba(255,255,255,0.60);
    --white-30: rgba(255,255,255,0.30);
  }

  html, body {
    background: var(--green-900);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  /* ══ HERO WRAPPER (UPDATED LAYOUT) ══ */
  .rm-hero {
    position: relative;
    width: 100%;
    height: 100svh;
    min-height: 500px;
    max-height: 1000px;
    display: flex;
    flex-direction: column;
    justify-content: center; /* Text lai center tira lyaunchha */
    overflow: hidden;
  }

  /* ══ PHOTO ══ */
  .rm-hero__photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 72% center;
    filter: brightness(0.52) saturate(0.8);
    z-index: 0;
  }

  /* ══ OVERLAYS ══ */
  .rm-ov-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28%;
    background: linear-gradient(to bottom, var(--green-900) 0%, transparent 100%);
    z-index: 1;
  }

  /* Overlay lai ali mathi samma tanieko chha taaki centered text clear padhna sakiyos */
  .rm-ov-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 85%; 
    background: linear-gradient(to top,
      rgba(10,31,14,0.98) 0%,
      rgba(10,31,14,0.85) 40%,
      rgba(10,31,14,0.20) 100%);
    z-index: 1;
  }

  .rm-ov-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 75% 50%, rgba(38,122,54,0.13) 0%, transparent 55%);
    z-index: 1;
  }

  /* ══ TOP BAR (UPDATED TO ABSOLUTE) ══ */
  .rm-topbar {
    position: absolute;
    top: 0; left: 0; width: 100%;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(16px, 4vw, 36px) clamp(20px, 5.5vw, 60px);
  }

  .rm-brand { display: flex; align-items: center; gap: 10px; }
  .rm-brand__line { width: clamp(24px, 4vw, 34px); height: 2px; background: var(--green-accent); flex-shrink: 0; }
  .rm-brand__text { font-family: 'Bebas Neue', sans-serif; font-size: clamp(12px, 2.5vw, 15px); letter-spacing: 0.25em; color: var(--white-60); }

  .rm-since {
    display: flex; flex-direction: column; align-items: center;
    border: 1px solid var(--white-30); border-radius: 4px;
    padding: clamp(5px, 1.2vw, 9px) clamp(10px, 2vw, 16px);
    backdrop-filter: blur(8px); background: rgba(10,31,14,0.48);
  }
  .rm-since__label { font-size: clamp(7px, 1.2vw, 9px); letter-spacing: 0.2em; text-transform: uppercase; color: var(--white-60); }
  .rm-since__year { font-family: 'Bebas Neue', sans-serif; font-size: clamp(18px, 4vw, 28px); line-height: 1; color: var(--gold-light); letter-spacing: 0.05em; }

  /* ══ SCROLL HINT ══ */
  .rm-scroll {
    position: absolute;
    bottom: 40px; /* Text center maa bhayeko le scroll lai bottom maa move gariyo */
    right: clamp(16px, 4vw, 44px);
    z-index: 6;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0.45;
  }
  .rm-scroll__line {
    width: 1px; height: clamp(30px, 5vw, 48px);
    background: linear-gradient(to bottom, transparent, var(--white));
    animation: rmscroll 2s ease-in-out infinite;
  }
  @keyframes rmscroll {
    0%, 100% { opacity: 0; transform: scaleY(0); transform-origin: top; }
    40%, 65% { opacity: 1; transform: scaleY(1); }
  }
  .rm-scroll__text { font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--white); writing-mode: vertical-lr; transform: rotate(180deg); }

  /* ══ TEXT CONTENT SECTION ══ */
  .rm-hero__content {
    position: relative;
    z-index: 5;
    padding: clamp(24px, 5vw, 40px) clamp(20px, 6vw, 80px);
    width: 100%;
    margin-top: 40px; /* Topbar lai breathing space dina */
  }

  /* Eyebrow */
  .rm-eyebrow {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: clamp(10px, 2vw, 16px);
  }
  .rm-eyebrow__dot {
    width: clamp(6px, 1vw, 8px); height: clamp(6px, 1vw, 8px);
    border-radius: 50%; background: var(--green-accent);
    flex-shrink: 0; animation: rmpulse 2.2s ease-in-out infinite;
  }
  @keyframes rmpulse {
    0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
    50% { opacity: 0.5; transform: scale(1.4); box-shadow: 0 0 10px 4px rgba(74, 222, 128, 0.1); }
  }
  .rm-eyebrow__text {
    font-size: clamp(10px, 2.2vw, 12px); font-weight: 500;
    letter-spacing: 0.25em; text-transform: uppercase; color: var(--green-accent); line-height: 1.2;
  }

  /* Name */
  .rm-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 15vw, 120px);
    line-height: 0.95; 
    letter-spacing: 0.02em;
    color: var(--white);
    margin-bottom: clamp(8px, 1.5vw, 12px);
    text-shadow: 0 4px 24px rgba(0,0,0,0.6);
  }
  .rm-name span { display: block; color: var(--gold-light); }

  /* Role */
  .rm-role {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(15px, 3.5vw, 22px);
    letter-spacing: 0.15em;
    color: var(--white-85);
    margin-bottom: clamp(16px, 3vw, 24px);
    text-transform: uppercase;
  }

  /* Divider */
  .rm-divider {
    width: clamp(40px, 8vw, 60px);
    height: 2px;
    background: linear-gradient(to right, var(--green-accent), transparent);
    margin-bottom: clamp(16px, 3vw, 24px);
  }

  /* Bio */
  .rm-bio {
    font-size: clamp(14px, 2.8vw, 16px);
    line-height: 1.65;
    color: var(--white-85);
    font-weight: 300;
    max-width: min(100%, 480px);
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .rm-bio strong {
    color: var(--white);
    font-weight: 600;
  }

  /* ══ MOBILE FIXES ══ */
  @media (max-width: 480px) {
    .rm-scroll { display: none; }
  }
  @media (max-width: 359px) {
    .rm-name { font-size: 48px; }
  }

  /* ══ DESKTOP ══ */
  @media (min-width: 768px) {
    .rm-hero__photo { object-position: 58% 18%; }
    .rm-hero__content { max-width: 680px; }
    .rm-bio { font-size: 16px; line-height: 1.8; }
    .rm-scroll { display: flex; }
    /* Desktop maa right side bata text readability badauna */
    .rm-ov-bottom {
        background: linear-gradient(to right,
          rgba(10,31,14,0.98) 0%,
          rgba(10,31,14,0.7) 50%,
          transparent 100%);
    }
  }

  @media (min-width: 1200px) {
    .rm-hero__content { max-width: 800px; }
  }
</style>
</head>
<body>

<section class="rm-hero">

  <img
    class="rm-hero__photo"
    src="Rohit.JPG" 
    alt="Rohit Malla speaking at Breakthrough event, Kathmandu"
  />

  <div class="rm-ov-top"></div>
  <div class="rm-ov-glow"></div>
  <div class="rm-ov-bottom"></div>

  <div class="rm-scroll">
    <span class="rm-scroll__text">Scroll</span>
    <div class="rm-scroll__line"></div>
  </div>

  <div class="rm-topbar">
    <div class="rm-brand">
      <div class="rm-brand__line"></div>
      <span class="rm-brand__text">Right Path</span>
    </div>
    <div class="rm-since">
      <span class="rm-since__label">Since</span>
      <span class="rm-since__year">2016</span>
    </div>
  </div>

  <div class="rm-hero__content">
    <div class="rm-eyebrow">
      <div class="rm-eyebrow__dot"></div>
      <span class="rm-eyebrow__text">Creating Leaders Across Nepal</span>
    </div>

    <h1 class="rm-name">
      Rohit<span>Malla</span>
    </h1>

    <p class="rm-role">Youth · Policy · Leadership</p>
    <div class="rm-divider"></div>

    <p class="rm-bio">
      Transforming lives through <strong>leadership, resilience &amp; purpose</strong> — from Kathmandu to communities across Nepal and beyond.
    </p>
  </div>

</section>

</body>
</html>
